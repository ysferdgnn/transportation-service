# Varsayılan: H2 in-memory, Liquibase kapalı (profil verilmezse bunlar kullanılır)
spring:
  datasource:
    url: jdbc:h2:mem:transportation-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_batch_fetch_size: 50

  liquibase:
    enabled: false

security:
  jwt:
    issuer: default-issuer
    secret: default-secret-min-32-characters-long
    access-token-ttl-minutes: 60
