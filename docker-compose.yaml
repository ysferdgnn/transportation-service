services:
  postgres:
    image: postgres:16-alpine
    container_name: transportation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: transportation
      POSTGRES_USER: transportation_user
      POSTGRES_PASSWORD: transportation_pass
    ports:
      - "5432:5432"
    volumes:
      - transportation_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transportation_user -d transportation"]
      interval: 5s
      timeout: 3s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: transportation-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - transportation_pgadmin_data:/var/lib/pgadmin

volumes:
  transportation_pg_data:
  transportation_pgadmin_data: