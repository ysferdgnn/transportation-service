spring:
  messages:
    basename: ${MESSAGES_BASENAME:messages}
    encoding: ${MESSAGES_ENCODING:UTF-8}

  application:
    name: ${APP_NAME:transportation-service}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transportation}
    username: ${DB_USER:transportation_user}
    password: ${DB_PASS:transportation_pass}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
        default_batch_fetch_size: ${HIBERNATE_BATCH_FETCH_SIZE:50}

  liquibase:
    enabled: ${LIQUIBASE_ENABLED:true}
    change-log: ${LIQUIBASE_CHANGELOG:classpath:/db/changelog/db.changelog-master.yaml}

springdoc:
  api-docs:
    path: ${SPRINGDOC_API_DOCS_PATH:/v3/api-docs}
  swagger-ui:
    path: ${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}
    operationsSorter: ${SPRINGDOC_OPERATIONS_SORTER:method}
    tagsSorter: ${SPRINGDOC_TAGS_SORTER:alpha}

logging:
  level:
    liquibase: ${LOG_LIQUIBASE_LEVEL:DEBUG}
    org.springframework.security: ${LOG_SPRING_SECURITY_LEVEL:DEBUG}
    org.springframework.web: ${LOG_SPRING_WEB_LEVEL:INFO}
    org.springframework.boot.autoconfigure.security: ${LOG_SECURITY_AUTOCONFIG_LEVEL:DEBUG}
    org.hibernate.SQL: ${LOG_HIBERNATE_SQL_LEVEL:DEBUG}
    org.hibernate.orm.jdbc.bind: ${LOG_HIBERNATE_BIND_LEVEL:TRACE}

security:
  jwt:
    issuer: ${JWT_ISSUER:VerySecureIssuer}
    secret: ${JWT_SECRET:CHANGE_ME_very_long_random_secret_min_32_chars}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:60}