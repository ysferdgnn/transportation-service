databaseChangeLog:

  - changeSet:
      id: 1
      author: yusuf
      changes:

        # =========================
        # USERS TABLE
        # =========================
        - createTable:
            tableName: users
            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_users
                    nullable: false

              - column:
                  name: username
                  type: VARCHAR(80)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_users_username

              - column:
                  name: password_hash
                  type: VARCHAR(120)
                  constraints:
                    nullable: false

              - column:
                  name: enabled
                  type: BOOLEAN
                  constraints:
                    nullable: false

        - createIndex:
            tableName: users
            indexName: ix_users_username
            unique: true
            columns:
              - column:
                  name: username


  - changeSet:
      id: 2
      author: yusuf
      changes:

        # =========================
        # USER ROLES TABLE
        # =========================
        - createTable:
            tableName: user_roles
            columns:

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false


        - addForeignKeyConstraint:
            constraintName: fk_user_roles_user
            baseTableName: user_roles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE

        - addPrimaryKey:
            tableName: user_roles
            columnNames: user_id, role
            constraintName: pk_user_roles

        - createIndex:
            tableName: user_roles
            indexName: ix_user_roles_user_id
            columns:
              - column:
                  name: user_id