services:
  postgres:
    image: postgres:16-alpine
    container_name: transportation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: transportation
      POSTGRES_USER: transportation_user
      POSTGRES_PASSWORD: transportation_pass
    ports:
      - "5432:5432"
    volumes:
      - transportation_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transportation_user -d transportation"]
      interval: 5s
      timeout: 3s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: transportation-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - transportation_pgadmin_data:/var/lib/pgadmin

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transportation-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: stb
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transportation
      SPRING_DATASOURCE_USERNAME: transportation_user
      SPRING_DATASOURCE_PASSWORD: transportation_pass

      # Liquibase / JPA
      LIQUIBASE_ENABLED: "true"
      JPA_DDL_AUTO: "validate"

      JWT_ISSUER: "transportation-service"
      JWT_SECRET: "CHANGE_ME_super_long_random_secret_min_32_chars"
      JWT_ACCESS_TTL_MINUTES: "60"
      JAVA_OPTS: "-Xms256m -Xmx512m"

volumes:
  transportation_pg_data:
  transportation_pgadmin_data: