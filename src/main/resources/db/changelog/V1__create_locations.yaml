databaseChangeLog:
  - changeSet:
      id: 1
      author: yusuf
      changes:
        - createTable:
            tableName: locations
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: location_code
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(120)
                  constraints:
                    nullable: false

              - column:
                  name: city
                  type: VARCHAR(120)
                  constraints:
                    nullable: false

              - column:
                  name: country
                  type: VARCHAR(120)
                  constraints:
                    nullable: false

        - createIndex:
            tableName: locations
            indexName: ux_locations_location_code
            unique: true
            columns:
              - column:
                  name: location_code